<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyodide Plotly Example</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js" charset="utf-8"></script>
</head>
<body>
<h1>Interactive Plotly Chart in Pyodide</h1>
<div id="plot-container"></div> <!-- Placeholder for the plot -->

<script>
    async function loadPyodideAndRun() {
        let pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        await pyodide.runPythonAsync(`
                import micropip
                await micropip.install("plotly")

                import plotly.graph_objects as go
                from js import document, eval

                # Create interactive figure
                fig = go.Figure()
                fig.add_trace(go.Scatter(x=[0, 1, 2, 3], y=[0, 1, 4, 9], mode='lines+markers'))

                # Convert to HTML
                html_str = fig.to_html(full_html=False, include_plotlyjs=False)

                # Insert into page
                document.getElementById("plot-container").innerHTML = html_str
            `);

        // Run the embedded Plotly script after inserting HTML
        let plotContainer = document.getElementById("plot-container");
        let scripts = plotContainer.getElementsByTagName("script");

        for (let script of scripts) {
            eval(script.textContent);
        }
    }

    loadPyodideAndRun();
</script>
</body>
</html>
